server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  server_tokens off;

  # Редиректы делаем относительными. Иначе nginx строит Location из своей схемы
  # (http) и своего порта, а TLS терминирует Traefik — человек ушёл бы
  # с https на http и вернулся лишним прыжком.
  absolute_redirect off;

  gzip on;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/xml
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  # 404 отдаём страницей и кодом 404. Если оставить `try_files … /index.html`,
  # любой битый адрес вернёт главную с кодом 200 — поисковик посчитает,
  # что таких страниц бесконечно много.
  error_page 404 /404.html;

  location = /404.html {
    internal;
    add_header Cache-Control "no-cache" always;
  }

  # HTML не кэшируем: иначе после деплоя человек продолжит видеть старую страницу.
  # `add_header` в location перекрывает серверные — поэтому заголовки повторены.
  location / {
    try_files $uri $uri/ =404;

    add_header Cache-Control "no-cache" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
  }

  # Astro хэширует имена ассетов, поэтому immutable на год безопасен.
  # Директиву `expires` не используем: вместе с `add_header` она отдавала
  # два разных заголовка Cache-Control в одном ответе.
  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|avif|woff|woff2|ttf)$ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log off;
  }

  location = /robots.txt  { add_header Cache-Control "public, max-age=3600" always; }
  location = /sitemap.xml { add_header Cache-Control "public, max-age=3600" always; }
}
